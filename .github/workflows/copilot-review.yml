name: Automated Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  code-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          components: clippy, rustfmt
          override: true

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v3
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Run Clippy
        continue-on-error: true
        run: |
          cargo clippy --all-targets --all-features --message-format=json -- -D warnings 2>&1 | tee clippy-output.json || true
          cargo clippy --all-targets --all-features -- -D warnings 2>&1 | tee clippy-output.txt || true

      - name: Check Rust Formatting
        continue-on-error: true
        run: |
          cargo fmt -- --check 2>&1 | tee fmt-output.txt || true

      - name: Run cargo check
        continue-on-error: true
        run: |
          cargo check --all-targets 2>&1 | tee check-output.txt || true

      - name: Analyze and create review
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          echo "Creating automated review for PR #${PR_NUMBER}"
          
          # 変更されたファイルを取得
          gh pr view ${PR_NUMBER} --json files --jq '.files[].path' > changed_files.txt
          
          # レビューコメントを生成
          echo "## 🤖 自動コードレビュー結果" > review-comment.md
          echo "" >> review-comment.md
          echo "このPRの自動解析が完了しました。" >> review-comment.md
          echo "" >> review-comment.md
          
          # 変更ファイルのリスト
          echo "### 📋 変更されたファイル" >> review-comment.md
          echo "" >> review-comment.md
          FILE_COUNT=$(wc -l < changed_files.txt)
          echo "合計 **${FILE_COUNT}個** のファイルが変更されました：" >> review-comment.md
          echo "" >> review-comment.md
          cat changed_files.txt | while read file; do
            echo "- \`$file\`" >> review-comment.md
          done
          echo "" >> review-comment.md
          
          # Clippyの結果を解析
          echo "### 🔍 Clippy 静的解析" >> review-comment.md
          echo "" >> review-comment.md
          if [ -s clippy-output.txt ] && grep -q "warning:" clippy-output.txt; then
            WARN_COUNT=$(grep -c "warning:" clippy-output.txt || echo "0")
            echo "⚠️  **${WARN_COUNT}件** の警告が見つかりました：" >> review-comment.md
            echo "" >> review-comment.md
            echo "<details><summary>詳細を表示</summary>" >> review-comment.md
            echo "" >> review-comment.md
            echo "\`\`\`" >> review-comment.md
            grep -A 3 "warning:" clippy-output.txt | head -n 100 >> review-comment.md
            echo "\`\`\`" >> review-comment.md
            echo "" >> review-comment.md
            echo "</details>" >> review-comment.md
            echo "" >> review-comment.md
          else
            echo "✅ Clippyによる警告は見つかりませんでした。" >> review-comment.md
            echo "" >> review-comment.md
          fi
          
          # フォーマットチェックの結果
          echo "### 📝 コードフォーマット" >> review-comment.md
          echo "" >> review-comment.md
          if [ -s fmt-output.txt ]; then
            echo "⚠️  フォーマットの問題が見つかりました：" >> review-comment.md
            echo "" >> review-comment.md
            echo "<details><summary>詳細を表示</summary>" >> review-comment.md
            echo "" >> review-comment.md
            echo "\`\`\`" >> review-comment.md
            cat fmt-output.txt >> review-comment.md
            echo "\`\`\`" >> review-comment.md
            echo "" >> review-comment.md
            echo "</details>" >> review-comment.md
            echo "" >> review-comment.md
            echo "修正するには: \`cargo fmt\`" >> review-comment.md
            echo "" >> review-comment.md
          else
            echo "✅ コードフォーマットは正しく適用されています。" >> review-comment.md
            echo "" >> review-comment.md
          fi
          
          # ビルドチェック
          echo "### 🔨 ビルドチェック" >> review-comment.md
          echo "" >> review-comment.md
          if [ -s check-output.txt ] && grep -q "error:" check-output.txt; then
            echo "❌ ビルドエラーが見つかりました：" >> review-comment.md
            echo "" >> review-comment.md
            echo "<details><summary>詳細を表示</summary>" >> review-comment.md
            echo "" >> review-comment.md
            echo "\`\`\`" >> review-comment.md
            grep -A 5 "error:" check-output.txt | head -n 50 >> review-comment.md
            echo "\`\`\`" >> review-comment.md
            echo "" >> review-comment.md
            echo "</details>" >> review-comment.md
            echo "" >> review-comment.md
          else
            echo "✅ ビルドチェックが正常に完了しました。" >> review-comment.md
            echo "" >> review-comment.md
          fi
          
          # Copilot手動レビューの案内
          echo "---" >> review-comment.md
          echo "" >> review-comment.md
          echo "### 💡 GitHub Copilotでさらに詳しくレビュー" >> review-comment.md
          echo "" >> review-comment.md
          echo "より詳細なレビューが必要な場合：" >> review-comment.md
          echo "" >> review-comment.md
          echo "1. **GitHub.com上で**: [Files changed]タブ → 右上のCopilotアイコン → \"Review changes\"" >> review-comment.md
          echo "2. **ローカルで**: \`gh pr checkout ${PR_NUMBER}\` → VSCodeでCopilot Chatを使用" >> review-comment.md
          echo "3. **CLIで**: \`gh copilot explain 'このPRの変更内容を説明して'\`" >> review-comment.md
          echo "" >> review-comment.md
          echo "---" >> review-comment.md
          echo "*🤖 このレビューは自動生成されました*" >> review-comment.md

      - name: Post review comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          gh pr comment ${PR_NUMBER} --body-file review-comment.md
